name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --generate-notes

      - name: Warm Go module proxy
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          URL="https://proxy.golang.org/github.com/roe-ai/roe-golang/@v/${TAG_NAME}.info"
          curl -sf "$URL" || { sleep 30; curl -sf "$URL"; }
