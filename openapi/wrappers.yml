      method: PUT
      path: /v1/connections/{id}/
      return_type: generated.Connection
      body_type: generated.UpdateConnectionRequest
      inject_organization_id: true
      parameters:
      - name: connectionID
        location: path
        wire_name: id
        go_type: string
