        wire_name: config
        go_type: map[string]any
        optional: false
        omit_when_empty: false
      - name: description
        location: body
        wire_name: description
        go_type: string
        optional: true
        omit_when_empty: true
      - name: authConfig
        location: body
        wire_name: auth_config
