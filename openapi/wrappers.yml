# Friendly Go SDK facades generated after the raw OpenAPI client.
# Generated from sdk_contract.yml by `uv run python -m roe_sdk sync-contract`.
# The release fan-out copies this file into roe-golang/openapi/wrappers.yml.

apis:
  discovery:
    struct_name: DiscoveryAPI
    field_name: Discovery
    docstring: API for discovering valid agent engine types and model IDs.
    operations:
    - kind: simple
      method_name: ListAgentEngineTypes
      docstring: Return production engine_class_id values accepted by agent creation.
      path: /v1/agents/types/
      return_type: generated.AgentEngineTypeList
    - kind: simple
      method_name: ListSupportedModels
      docstring: Return non-deprecated model IDs accepted in engine_config.model.
      path: /v1/agents/models/
      return_type: generated.SupportedLLMModelList
      parameters:
      - name: capability
        wire_name: capability
        go_type: string
        optional: true
        omit_when_empty: true
  tables:
    struct_name: TablesAPI
    field_name: Tables
    docstring: API for managing Roe tables.
    operations:
    - kind: body
      method_name: List
      docstring: List Roe tables.
      method: GET
      path: /v1/tables/
      return_type: generated.TableListResponse
    - kind: table_upload
      method_name: Upload
      docstring: Upload a CSV file and create a Roe table.
      path: /v1/tables/upload/
      return_type: generated.TableUploadResponse
      body_type: generated.TableUploadRequest
    - kind: body
      method_name: Query
      docstring: Run a read-only query against Roe tables.
      method: POST
      path: /v1/tables/query/
      return_type: generated.TableQuerySubmitResponse
      body_type: generated.TableQueryRequest
      parameters:
      - name: sql
        location: body
        wire_name: sql
        go_type: string
        optional: false
        omit_when_empty: false
      - name: limit
        location: body
        wire_name: limit
        go_type: int
        optional: true
        omit_when_empty: true
    - kind: body
      method_name: QueryResult
      docstring: Get the result for a submitted table query.
      method: GET
      path: /v1/tables/query/{table_query_id}/result/
      return_type: generated.TableQueryResultResponse
      parameters:
      - name: tableQueryID
        location: path
        wire_name: table_query_id
        go_type: string
        optional: false
        omit_when_empty: false
    - kind: body
      method_name: Describe
      docstring: Describe a Roe table.
      method: GET
      path: /v1/tables/{table_name}/describe/
      return_type: generated.TableDescribeResponse
      parameters:
      - name: tableName
        location: path
        wire_name: table_name
        go_type: string
        optional: false
        omit_when_empty: false
    - kind: body
      method_name: Preview
      docstring: Preview rows from a Roe table.
      method: GET
      path: /v1/tables/{table_name}/preview/
      return_type: generated.TablePreviewResponse
      parameters:
      - name: tableName
        location: path
        wire_name: table_name
        go_type: string
        optional: false
        omit_when_empty: false
      - name: limit
        location: query
        wire_name: limit
        go_type: int
        optional: true
        omit_when_empty: true
    - kind: body
      method_name: Delete
      docstring: Delete a Roe table.
      method: DELETE
      path: /v1/tables/{table_name}/
      parameters:
      - name: tableName
        location: path
        wire_name: table_name
        go_type: string
        optional: false
        omit_when_empty: false
  agents:
    struct_name: AgentsAPI
    field_name: Agents
    docstring: manages agent operations.
    operations:
    - kind: body
      method_name: List
      docstring: returns paginated agents.
      method: GET
      path: /v1/agents/
      return_type: PaginatedResponse[BaseAgent]
      inject_organization_id: true
      set_api_hook: paginated
      parameters:
      - name: page
        location: query
        wire_name: page
        go_type: int
        optional: true
        omit_when_empty: true
      - name: pageSize
        location: query
        wire_name: page_size
        go_type: int
        optional: true
        omit_when_empty: true
    - kind: body
      method_name: Retrieve
      docstring: fetches an agent.
      method: GET
      path: /v1/agents/{agent_id}/
      return_type: BaseAgent
      error_wrap: retrieve agent %s
      set_api_hook: scalar
      parameters:
      - name: agentID
        location: path
        go_type: string
        validate_nonempty: true
    - kind: body
      method_name: Create
      docstring: creates a new agent.
      method: POST
      path: /v1/agents/
      return_type: BaseAgent
      inject_organization_id: true
      set_api_hook: scalar
      parameters:
      - name: name
        location: body
        wire_name: name
        go_type: string
      - name: engineClassID
        location: body
        wire_name: engine_class_id
        go_type: string
      - name: inputDefs
        location: body
        wire_name: input_definitions
        go_type: '[]map[string]any'
      - name: engineConfig
        location: body
        wire_name: engine_config
        go_type: map[string]any
      - name: versionName
        location: body
        wire_name: version_name
        go_type: string
        optional: true
        omit_when_empty: true
      - name: description
        location: body
        wire_name: description
        go_type: string
        optional: true
        omit_when_empty: true
    - kind: body
      method_name: Update
      docstring: updates mutable fields of an agent.
      method: PATCH
      path: /v1/agents/{agent_id}/
      return_type: BaseAgent
      set_api_hook: scalar
      parameters:
      - name: agentID
        location: path
        go_type: string
        validate_nonempty: true
      - name: name
        location: body
        wire_name: name
        go_type: string
        optional: true
        omit_when_empty: true
      - name: disableCache
        location: body
        wire_name: disable_cache
        go_type: '*bool'
        optional: true
      - name: cacheFailedJobs
        location: body
        wire_name: cache_failed_jobs
        go_type: '*bool'
        optional: true
    - kind: body
      method_name: Replace
      docstring: replaces an agent.
      method: PUT
      path: /v1/agents/{agent_id}/
      return_type: BaseAgent
      set_api_hook: scalar
      parameters:
      - name: agentID
        location: path
        go_type: string
        validate_nonempty: true
      - name: name
        location: body
        wire_name: name
        go_type: string
        optional: true
      - name: disableCache
        location: body
        wire_name: disable_cache
        go_type: '*bool'
        optional: true
      - name: cacheFailedJobs
        location: body
        wire_name: cache_failed_jobs
        go_type: '*bool'
        optional: true
    - kind: body
      method_name: Delete
      docstring: removes an agent.
      method: DELETE
      path: /v1/agents/{agent_id}/
      error_wrap: delete agent %s
      parameters:
      - name: agentID
        location: path
        go_type: string
        validate_nonempty: true
    - kind: manual
      method_name: Duplicate
      docstring: clones an agent.
      method: POST
      path: /v1/agents/{agent_id}/duplicate/
    - kind: manual
      method_name: Run
      docstring: starts an async job for the given agent.
      method: POST
      path: /v1/agents/run/{agent_id}/async/
    - kind: manual
      method_name: RunMany
      docstring: submits batch jobs.
      method: POST
      path: /v1/agents/run/{agent_id}/async/many/
    - kind: manual
      method_name: RunSync
      docstring: runs synchronously and returns outputs.
      method: POST
      path: /v1/agents/run/{agent_id}/
    - kind: manual
      method_name: RunVersion
      docstring: runs a specific version asynchronously.
      method: POST
      path: /v1/agents/run/{agent_id}/versions/{agent_version_id}/async/
    - kind: manual
      method_name: RunVersionSync
      docstring: runs a specific version synchronously.
      method: POST
      path: /v1/agents/run/{agent_id}/versions/{agent_version_id}/
    namespaces:
      versions:
        struct_name: AgentVersionsAPI
        field_name: Versions
        docstring: handles version operations.
        operations:
        - kind: body
          method_name: List
          docstring: ''
          method: GET
          path: /v1/agents/{agent_id}/versions/
          return_type: '[]AgentVersion'
          error_wrap: list agent versions
          set_api_hook: list
          parameters:
          - name: agentID
            location: path
            go_type: string
            validate_nonempty: true
        - kind: body
          method_name: Retrieve
          docstring: ''
          method: GET
          path: /v1/agents/{agent_id}/versions/{agent_version_id}/
          return_type: AgentVersion
          set_api_hook: scalar
          parameters:
          - name: agentID
            location: path
            go_type: string
          - name: versionID
            location: path
            go_type: string
          - name: getSupportsEval
            location: query
            wire_name: get_supports_eval
            go_type: '*bool'
            optional: true
        - kind: manual
          method_name: RetrieveCurrent
          docstring: ''
          method: GET
          path: /v1/agents/{agent_id}/versions/current/
        - kind: body
          method_name: Create
          docstring: ''
          method: POST
          path: /v1/agents/{agent_id}/versions/
          return_type: AgentVersion
          refetch_with_retrieve: true
          refetch_extra_args:
          - nil
          parameters:
          - name: agentID
            location: path
            go_type: string
          - name: inputDefs
            location: body
            wire_name: input_definitions
            go_type: '[]map[string]any'
          - name: engineConfig
            location: body
            wire_name: engine_config
            go_type: map[string]any
          - name: versionName
            location: body
            wire_name: version_name
            go_type: string
            optional: true
            omit_when_empty: true
          - name: description
            location: body
            wire_name: description
            go_type: string
            optional: true
            omit_when_empty: true
        - kind: body
          method_name: Update
          docstring: ''
          method: PATCH
          path: /v1/agents/{agent_id}/versions/{agent_version_id}/
          parameters:
          - name: agentID
            location: path
            go_type: string
            validate_nonempty: true
          - name: versionID
            location: path
            go_type: string
            validate_nonempty: true
          - name: versionName
            location: body
            wire_name: version_name
            go_type: string
            optional: true
            omit_when_empty: true
          - name: description
            location: body
            wire_name: description
            go_type: string
            optional: true
            omit_when_empty: true
        - kind: body
          method_name: Replace
          docstring: replaces an agent version.
          method: PUT
          path: /v1/agents/{agent_id}/versions/{agent_version_id}/
          parameters:
          - name: agentID
            location: path
            go_type: string
            validate_nonempty: true
          - name: versionID
            location: path
            go_type: string
            validate_nonempty: true
          - name: versionName
            location: body
            wire_name: version_name
            go_type: string
            optional: true
          - name: description
            location: body
            wire_name: description
            go_type: string
            optional: true
        - kind: body
          method_name: Delete
          docstring: ''
          method: DELETE
          path: /v1/agents/{agent_id}/versions/{agent_version_id}/
          parameters:
          - name: agentID
            location: path
            go_type: string
          - name: versionID
            location: path
            go_type: string
        - kind: manual
          method_name: ListPaginated
          docstring: ''
          method: GET
          path: /v1/agents/{agent_id}/versions/
        - kind: manual
          method_name: RetrieveCurrentWithEval
          docstring: ''
          method: GET
          path: /v1/agents/{agent_id}/versions/current/
      jobs:
        struct_name: AgentJobsAPI
        field_name: Jobs
        docstring: handles job operations.
        operations:
        - kind: body
          method_name: ListJobs
          docstring: returns an agent's jobs (paginated) with filter and sort options.
          method: GET
          path: /v1/agents/{agent_id}/jobs/
          return_type: PaginatedResponse[ListAgentJob]
          inject_organization_id: true
          set_api_hook: paginated
          parameters:
          - name: agentID
            location: path
            go_type: string
          - name: page
            location: query
            wire_name: page
            go_type: int
            optional: true
            omit_when_empty: true
          - name: pageSize
            location: query
            wire_name: page_size
            go_type: int
            optional: true
            omit_when_empty: true
          - name: statusCode
            location: query
            wire_name: status_code
            go_type: string
            optional: true
            omit_when_empty: true
          - name: versionName
            location: query
            wire_name: version_name
            go_type: string
            optional: true
            omit_when_empty: true
          - name: metadata
            location: query
            wire_name: metadata
            go_type: string
            optional: true
            omit_when_empty: true
          - name: createdFrom
            location: query
            wire_name: created_from
            go_type: string
            optional: true
            omit_when_empty: true
          - name: createdTo
            location: query
            wire_name: created_to
            go_type: string
            optional: true
            omit_when_empty: true
          - name: search
            location: query
            wire_name: search
            go_type: string
            optional: true
            omit_when_empty: true
          - name: ordering
            location: query
            wire_name: ordering
            go_type: string
            optional: true
            omit_when_empty: true
        - kind: body
          method_name: RetrieveStatus
          docstring: ''
          method: GET
          path: /v1/agents/jobs/{job_id}/status/
          return_type: AgentJobStatus
          parameters:
          - name: jobID
            location: path
            go_type: string
        - kind: body
          method_name: RetrieveResult
          docstring: ''
          method: GET
          path: /v1/agents/jobs/{agent_job_id}/result/
          return_type: AgentJobResult
          parameters:
          - name: jobID
            location: path
            go_type: string
        - kind: body
          method_name: RetrieveArtifact
          docstring: ''
          method: GET
          path: /v1/agents/jobs/{agent_job_id}/artifacts/result/
          return_type: AgentJobArtifactResult
          parameters:
          - name: jobID
            location: path
            go_type: string
          - name: artifactKey
            location: query
            wire_name: artifact_key
            go_type: string
        - kind: body
          method_name: Cancel
          docstring: cancels a running job.
          method: POST
          path: /v1/agents/jobs/{job_id}/cancel/
          parameters:
          - name: jobID
            location: path
            go_type: string
            validate_nonempty: true
        - kind: body
          method_name: CancelAll
          docstring: cancels all running jobs for an agent.
          method: POST
          path: /v1/agents/{agent_id}/jobs/cancel-all/
          parameters:
          - name: agentID
            location: path
            go_type: string
            validate_nonempty: true
        - kind: body
          method_name: DeleteData
          docstring: ''
          method: POST
          path: /v1/agents/jobs/{job_id}/delete-data/
          return_type: JobDataDeleteResponse
          parameters:
          - name: jobID
            location: path
            go_type: string
        - kind: manual
          method_name: RetrieveStatusMany
          docstring: ''
          method: POST
          path: /v1/agents/jobs/statuses/
        - kind: manual
          method_name: RetrieveResultMany
          docstring: ''
          method: POST
          path: /v1/agents/jobs/results/
        - kind: manual
          method_name: DownloadReference
          docstring: ''
          method: GET
          path: /v1/agents/jobs/{agent_job_id}/references/{resource_id}/
  knowledge_base:
    struct_name: KnowledgeBaseAPI
    field_name: KnowledgeBase
    docstring: API for managing Knowledge Base lenses and drafts.
    operations:
    - kind: manual
      method_name: List
      docstring: List all knowledge bases for the organisation.
      method: GET
      path: /v1/knowledge-base/
    - kind: manual
      method_name: Create
      docstring: Create a new knowledge base draft (async generation).
      method: POST
      path: /v1/knowledge-base/
    - kind: manual
      method_name: Retrieve
      docstring: Retrieve a single knowledge base record.
      method: GET
      path: /v1/knowledge-base/{id}/
    - kind: manual
      method_name: Delete
      docstring: Delete a knowledge base and its associated Atlas draft or lens.
      method: DELETE
      path: /v1/knowledge-base/{id}/
    - kind: manual
      method_name: PollDraft
      docstring: Poll the Atlas draft status until ready or error.
      method: GET
      path: /v1/knowledge-base/{id}/draft/
    - kind: manual
      method_name: PatchSelection
      docstring: Patch the draft's typology/tactic selection.
      method: PATCH
      path: /v1/knowledge-base/{id}/selection/
    - kind: manual
      method_name: Regenerate
      docstring: Kick off an async regeneration round with optional feedback.
      method: POST
      path: /v1/knowledge-base/{id}/regenerate/
    - kind: manual
      method_name: Resolve
      docstring: Approve or decline a pending regeneration proposal.
      method: POST
      path: /v1/knowledge-base/{id}/resolve/
    - kind: manual
      method_name: Finalize
      docstring: Commit the draft into a permanent Atlas lens.
      method: POST
      path: /v1/knowledge-base/{id}/finalize/
    - kind: manual
      method_name: Sync
      docstring: Sync the lens snapshot from Atlas (best-effort).
      method: POST
      path: /v1/knowledge-base/{id}/sync/
    - kind: manual
      method_name: Unlink
      docstring: Unlink a knowledge base locally, preserving the Atlas lens.
      method: DELETE
      path: /v1/knowledge-base/{id}/unlink/
    - kind: manual
      method_name: Catalog
      docstring: Fetch the names-only typology and tactic catalog.
      method: GET
      path: /v1/knowledge-base/catalog/
    - kind: manual
      method_name: LensByAtlasId
      docstring: Fetch and optionally sync a lens by its Atlas ID.
      method: GET
      path: /v1/knowledge-base/lens/{atlas_lens_id}/
    - kind: manual
      method_name: ImportLens
      docstring: Import a finalized Atlas lens into roe-main by its atlas_lens_id.
      method: POST
      path: /v1/knowledge-base/import-lens/
  connections:
