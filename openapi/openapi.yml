            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
              examples:
                Example:
                  value:
                    id: 456e7890-e89b-12d3-a456-426614174001
                    name: My Agent
                    version_name: version 2
                    creator:
                      id: 2
                      email: user@example.com
                      first_name: John
                      last_name: Doe
                    created_at: '2024-01-15T10:30:00Z'
                    description: Current version of the agent
                    engine_class_id: TextExtractionEngine
                    input_definitions:
                    - key: text
                      data_type: text/plain
                      description: Text to be processed
                      accepts_multiple_files: null
                    engine_config:
                      text: ${text}
                      model: gpt-4.1-2025-04-14
                      instruction: Process the text
                      temperature: '0.0'
                      output_schema: '{"type":"string","description":"The result"}'
                      reasoning_effort: medium
                    organization: f3268066-4185-4353-8e0d-8089c759610c
                    readonly: false
                    base_agent:
                      id: 123e4567-e89b-12d3-a456-426614174000
                      creator:
                        id: 2
                        email: user@example.com
                        first_name: John
                        last_name: Doe
                      created_at: '2024-01-15T10:30:00Z'
                      name: My Agent
                      disable_cache: false
                      cache_failed_jobs: false
                      organization: f3268066-4185-4353-8e0d-8089c759610c
                      engine_class_id: TextExtractionEngine
                      current_version_id: 456e7890-e89b-12d3-a456-426614174001
                      engine_name: Text Insights
                    engine_name: Text Insights
          description: Successfully retrieved current agent version details.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Permission to access this agent denied or access to Agents
            feature is forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
  /v1/agents/jobs/{agent_job_id}/references/{resource_id}/:
    get:
      operationId: v1_agents_jobs_references_retrieve
      description: 'Token-authenticated proxy view for serving web resource references
        from S3.


        Uses Organization API Key authentication (for external API consumers).


        URL: /api/v1/agents/jobs/{agent_job_id}/references/{resource_id}/'
      parameters:
      - in: path
        name: agent_job_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: resource_id
        schema:
          type: string
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
