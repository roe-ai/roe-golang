      summary: Delete an agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - in: path
        name: agent_version_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent version.
