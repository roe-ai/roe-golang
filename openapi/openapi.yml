                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Policy not found.
  /v1/policies/{policy_id}/versions/{version_id}/:
    get:
      operationId: policies_versions_retrieve
      description: |-
        Get a specific policy version by policy_id and version_id.
        Used for nested URL pattern: /policies/{policy_id}/versions/{version_id}/
      parameters:
      - in: path
        name: policy_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: version_id
        schema:
          type: string
          format: uuid
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - policies
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersion'
          description: Successfully retrieved policy version.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Policy or policy version not found.
  /v1/tables/:
    get:
      operationId: tables_list
      description: List Roe tables in the authenticated organization with column information.
      summary: List Roe tables
      tags:
      - tables
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableListResponse'
          description: ''
  /v1/tables/{table_name}/:
    delete:
      operationId: tables_destroy
      description: Permanently drop one Roe table from the authenticated organization
        and remove table-link metadata that references it.
      summary: Delete a Roe table
      parameters:
      - in: path
        name: table_name
        schema:
          type: string
        required: true
      tags:
      - tables
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                description: 'DRF ValidationError raised with a message string: the
                  body is a bare JSON array of error messages.'
          description: Invalid table name (bare array of messages).
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Table not found
  /v1/tables/{table_name}/describe/:
    get:
      operationId: tables_describe_retrieve
      description: Return table metadata only for one Roe table in the authenticated
        organization, including columns and cheap ClickHouse metadata such as row
        count and the latest metadata-modification timestamp when available.
      summary: Describe a Roe table
      parameters:
      - in: path
        name: table_name
        schema:
          type: string
        required: true
      tags:
      - tables
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableDescribeResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                description: 'DRF ValidationError raised with a message string: the
                  body is a bare JSON array of error messages.'
          description: Invalid table name (bare array of messages).
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Table not found
  /v1/tables/{table_name}/preview/:
    get:
      operationId: tables_preview_retrieve
      description: Return column metadata plus a bounded sample of rows from one Roe
        table in the authenticated organization.
      summary: Preview a Roe table
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 50
          minimum: 0
          default: 3
        description: Maximum number of sample rows to return. Use 0 to return only
          table and column metadata without reading sample rows.
      - in: path
        name: table_name
        schema:
          type: string
        required: true
      tags:
      - tables
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TablePreviewResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  items:
                    type: string
                  description: 'DRF ValidationError raised with a message string:
                    the body is a bare JSON array of error messages.'
                - type: object
                  additionalProperties:
                    oneOf:
                    - type: array
                      items:
                        type: string
                    - type: string
                  description: 'Validation failure: a map of field name to a list
                    of error messages (DRF serializers) or a single message (e.g.
                    organization_id validation).'
                - type: object
                  properties:
                    error:
                      type: string
                  required:
                  - error
                  description: Hand-built application error body.
                description: Bad request. The body is a bare array of messages, a
                  field-error map, or an {error} object depending on which validation
                  failed.
          description: Invalid table name (bare array of messages) or invalid limit
            query param (field error map).
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Table not found
  /v1/tables/query/:
    post:
      operationId: tables_query_create
      description: Run a read-only SQL query over public Roe tables.
      summary: Run a read-only Roe table query
      tags:
      - tables
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableQueryRequest'
        required: true
      security:
      - apiKeyAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableQuerySubmitResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                description: 'Validation failure: a map of field name to a list of
                  error messages (DRF serializers) or a single message (e.g. organization_id
                  validation).'
          description: Invalid request body (field error map).
  /v1/tables/query/{table_query_id}/result/:
    get:
      operationId: tables_query_result_retrieve
      description: Poll or fetch one public Roe table query result.
      summary: Get a Roe table query result
      parameters:
      - in: path
        name: table_query_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - tables
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableQueryResultResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: No access to this query's organization.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Table query or its results not found.
  /v1/tables/upload/:
    post:
      operationId: upload_table
      description: Create a Roe table in the authenticated organization from an uploaded
        CSV file. Organization API keys are scoped to one organization; if organization_id
        is supplied, it must match that organization.
      summary: Upload a CSV as a Roe table
      tags:
      - tables
      - sdk
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TableUploadRequest'
        required: true
      security:
      - apiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableUploadResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  items:
                    type: string
                  description: 'DRF ValidationError raised with a message string:
                    the body is a bare JSON array of error messages.'
                - type: object
                  additionalProperties:
                    oneOf:
                    - type: array
                      items:
                        type: string
                    - type: string
                  description: 'Validation failure: a map of field name to a list
                    of error messages (DRF serializers) or a single message (e.g.
                    organization_id validation).'
                - type: object
                  properties:
                    error:
                      type: string
                  required:
                  - error
                  description: Hand-built application error body.
                description: Bad request. The body is a bare array of messages, a
                  field-error map, or an {error} object depending on which validation
                  failed.
          description: Serializer field errors (map), or import-time validation failures
            such as a duplicate/invalid table name or an empty CSV (bare array of
            messages).
  /v1/users/current_user/:
    get:
      operationId: users_current_user_retrieve
      summary: Get the current user
      tags:
      - users
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
components:
  schemas:
    AgentDatum:
      type: object
      properties:
        key:
          type: string
          description: The key of the output
        description:
          type: string
          description: The description of the output
        data_type:
          type: string
          description: The MIME data type of the output
        value:
          type: string
          description: The value of the output, serialized as a string
        cost:
          type: number
          format: double
          description: The cost of the agent job execution
      required:
      - data_type
      - key
      - value
    AgentEngineTypeList:
      type: object
      description: Serializer for public agent engine type discovery.
      properties:
        engine_types:
          type: array
          items:
            type: string
          description: Valid agent engine_class_id values accepted by create-agent
            APIs
        total_count:
          type: integer
          description: Number of engine types returned
        engines:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Production agent engine metadata, including descriptions, input
            schemas, and default engine_config values
      required:
      - engine_types
      - engines
      - total_count
    AgentExecutionRequest:
      type: object
      description: Agent execution request. In addition to `metadata`, every key of
        the agent's input definitions is accepted as a property (text value or file
        upload).
      properties:
        metadata:
          type:
          - object
          - 'null'
          additionalProperties: true
          description: Optional metadata stored as-is on the created agent job. A
            JSON-encoded object string is also accepted; null is treated the same
            as omitting the field (empty metadata). Only honored by the single-run
            endpoints — when this object is an item of the run-async-many `inputs`
            list, `metadata` is ignored.
      additionalProperties: true
    AgentInputDefinition:
      type: object
      properties:
        key:
          type: string
          description: The unique identifier for this input definition
        data_type:
          type: string
          description: The data type of the input (e.g., text, file, etc.)
        description:
          type: string
          description: Description of what this input is for
        example:
          type: string
          description: An example value for this input
        accepts_multiple_files:
          type: boolean
          description: Whether this input accepts multiple files
      required:
      - data_type
      - description
      - key
    AgentJobDeleteDataResponse:
      type: object
      description: Response payload of purge_agent_job_data (delete-data and :purgeData).
      properties:
        status:
          type: string
          description: 'Overall status: ''success'' or ''partial_success'''
        deleted_count:
          type: integer
          description: Number of input files successfully deleted
        failed_count:
          type: integer
          description: Number of input files that failed to delete
        blob_sanitized:
          type: boolean
          description: Whether blob data (outputs, steps, logs, trace) was successfully
            sanitized
        artifacts_deleted_count:
          type: integer
          description: Number of workflow artifacts successfully deleted
        artifacts_failed_count:
          type: integer
          description: Number of workflow artifacts that failed to delete
        errors:
          type:
          - array
          - 'null'
          items:
            type: string
          description: List of errors encountered during deletion; null when none
      required:
      - artifacts_deleted_count
      - artifacts_failed_count
      - blob_sanitized
      - deleted_count
      - errors
      - failed_count
      - status
    AgentJobResultItem:
      type: object
      description: Serializer for individual agent job result item.
      properties:
        id:
          type: string
          description: Agent job ID
        status:
          type:
          - integer
          - 'null'
          description: Job status code (0=PENDING, 1=STARTED, 2=RETRY, 3=SUCCESS,
            4=FAILURE, 5=CANCELLED, 6=CACHED)
        result:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: List of job outputs, or error code if job failed
        corrected_outputs:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: List of corrected outputs if any corrections were made
        agent_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Base agent ID
        agent_version_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Agent version ID
        cost:
          type:
          - number
          - 'null'
          format: double
          description: Cost of the agent job execution
        inputs:
          type:
          - array
          - 'null'
          items: {}
          description: The input data provided to the agent (full version from blob
            if available, truncated from DB otherwise)
        input_tokens:
          type:
          - integer
          - 'null'
          description: Number of input tokens used
        output_tokens:
          type:
          - integer
          - 'null'
          description: Number of output tokens generated
      required:
      - agent_id
      - agent_version_id
      - cost
      - id
      - input_tokens
      - inputs
      - output_tokens
      - result
      - status
    AgentJobResultManyRequest:
      type: object
      description: Serializer for bulk agent job results request.
      properties:
        job_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of agent job IDs to retrieve results for
          minItems: 1
      required:
      - job_ids
    AgentJobResultResponse:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
          description: The ID of the base agent
        agent_version_id:
          type: string
          format: uuid
          description: The ID of the agent version
        inputs:
          type: array
          items: {}
          description: The input data provided to the agent
        input_tokens:
          type:
          - integer
          - 'null'
          description: Number of input tokens used
        output_tokens:
          type:
          - integer
          - 'null'
          description: Number of output tokens generated
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: The output data from the agent
      required:
      - agent_id
      - agent_version_id
      - input_tokens
      - inputs
      - output_tokens
      - outputs
    AgentJobSingleStatus:
      type: object
      properties:
        status:
          type: integer
          description: 'Status code. 0: PENDING, 1: STARTED, 2: RETRY, 3: SUCCESS,
            4: FAILURE, 5: CANCELLED, 6: CACHED'
        timestamp:
          type: number
          format: double
          description: Unix timestamp in seconds (fractional)
        error_message:
          type: string
          description: Error message if status is RETRY or FAILURE
      required:
      - status
      - timestamp
    AgentJobStatus:
      type: object
      description: Serializer for individual agent job status response.
      properties:
        id:
          type: string
          format: uuid
          description: Agent job ID
        status:
          type:
          - integer
          - 'null'
          description: Current status code (0=PENDING, 1=STARTED, 2=RETRY, 3=SUCCESS,
            4=FAILURE, 5=CANCELLED, 6=CACHED)
        created_at:
          type:
          - string
          - 'null'
          format: date-time
          description: When the job was created
        last_updated_at:
          type:
          - string
          - 'null'
          format: date-time
          description: When the job was last updated
        timestamp:
          type:
          - number
          - 'null'
          format: double
          description: Unix timestamp in seconds from the latest status event
        error_message:
          type:
          - string
          - 'null'
          description: Error message if status is FAILURE or RETRY
      required:
      - created_at
      - id
      - last_updated_at
      - status
    AgentJobStatusManyRequest:
      type: object
      description: Serializer for bulk agent job status request.
      properties:
        job_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of agent job IDs to retrieve statuses for
          minItems: 1
      required:
      - job_ids
    AgentRunAsyncManyRequest:
      type: object
      description: Serializer for agent async many execution requests.
      properties:
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/AgentExecutionRequest'
          description: List of agent execution requests to process
      required:
      - inputs
    AgentTag:
      type: object
      description: Serializer for AgentTag model
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 50
        color:
          $ref: '#/components/schemas/ColorEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type:
          - integer
          - 'null'
          readOnly: true
        usage_count:
          type: integer
          description: Count of agents using this tag
          readOnly: true
      required:
      - color
      - created_at
      - creator
      - id
      - name
      - usage_count
    AgentVersion:
      type: object
      description: Serializer for Agent (version) model
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        version_name:
          type: string
          description: Version name for the agent version. Defaults to 'unnamed version'
            if not provided.
        creator:
          oneOf:
          - $ref: '#/components/schemas/UserInfo'
          - type: 'null'
        created_at:
          type: string
          format: date-time
          readOnly: true
        description:
          type: string
          description: Description of the agent version.
        engine_class_id:
          type: string
          description: Get engine_class_id from base_agent.
          readOnly: true
        engine_name:
          type: string
          description: Engine Display Name
          readOnly: true
        input_definitions:
          type: array
          items:
            $ref: '#/components/schemas/AgentInputDefinition'
          description: List of input definitions for this agent version.
        engine_config:
          description: Engine configuration.
        organization_id:
          type: string
          format: uuid
          readOnly: true
          description: Organization ID from base_agent.
        readonly:
          type: boolean
          readOnly: true
        base_agent:
          allOf:
          - $ref: '#/components/schemas/BaseAgent'
          readOnly: true
      required:
      - base_agent
      - created_at
      - engine_class_id
      - engine_config
      - engine_name
      - id
      - input_definitions
      - name
      - organization_id
      - readonly
      - version_name
    AgentVersionCreateRequest:
      type: object
      description: Serializer for creating new agent versions
      properties:
        version_name:
          type: string
          minLength: 1
          description: Version name for the agent version. Defaults to 'unnamed version'
            if not provided.
        description:
          type:
          - string
          - 'null'
          description: Description for the agent version.
        input_definitions:
          description: List of input definitions for this agent version.
        engine_config:
          description: Engine configuration as a dictionary of string key-value pairs.
    AgentVersionUpdateRequest:
      type: object
      properties:
        version_name:
          type: string
          minLength: 1
          description: New version name for the agent version.
        description:
          type: string
          minLength: 1
          description: New description for the agent version.
    ApiErrorResponse:
      type: object
      description: 'Hand-built application error body: `Response({"error": ...}, 4xx/5xx)`.'
      properties:
        error:
          type: string
          description: Application error message
      required:
      - error
    BaseAgent:
      type: object
      description: Serializer for BaseAgent (agent config)
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        creator:
          oneOf:
          - $ref: '#/components/schemas/UserInfo'
          - type: 'null'
        created_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 200
          minLength: 1
        disable_cache:
          type: boolean
          description: Whether to disable job cache fetching for this agent.
        cache_failed_jobs:
          type: boolean
          description: Whether to cache failed jobs for this agent.
        organization_id:
          type: string
          format: uuid
          description: Organization ID that owns this agent.
        engine_class_id:
          type: string
          maxLength: 200
        current_version_id:
          type: string
          format: uuid
          readOnly: true
          description: UUID of the current agent version.
        job_count:
          type:
          - integer
          - 'null'
          description: Job count from annotation, or None when not fetched (use /agents/job-stats/).
          readOnly: true
        most_recent_job:
          type:
          - string
          - 'null'
          format: date-time
          readOnly: true
        engine_name:
          type: string
          description: Engine Display Name
          readOnly: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/AgentTag'
          readOnly: true
      required:
      - cache_failed_jobs
      - created_at
      - current_version_id
      - disable_cache
      - engine_class_id
      - engine_name
      - id
      - job_count
      - most_recent_job
      - name
      - organization_id
      - tags
    BaseAgentCreateRequest:
      type: object
      description: Serializer for creating base agents with proper JSON field handling
      properties:
        name:
          type: string
          minLength: 1
          description: Name of the base agent.
        engine_class_id:
          type: string
          minLength: 1
          description: Engine class ID for the agent.
        organization_id:
          type: string
          format: uuid
          description: Optional. Ignored by the API — the organization is derived
            from the authenticated API key/token. Accepted for backwards compatibility.
        version_name:
          type: string
          minLength: 1
          description: Name of the first version.
        description:
          type: string
          minLength: 1
          description: Description of the first version.
        input_definitions:
          description: Input definitions for the first version.
        engine_config:
          description: Engine configuration for the first version.
      required:
      - engine_class_id
      - name
    BaseAgentUpdateRequest:
      type: object
      description: Serializer for updating BaseAgent
      properties:
        name:
          type: string
          minLength: 1
          description: New name for the agent. Must not be empty if provided.
        disable_cache:
          type: boolean
          description: Whether to disable job cache fetching for this agent.
        cache_failed_jobs:
          type: boolean
          description: Whether to cache failed jobs for this agent.
    ColorEnum:
      enum:
      - blue
      - green
      - purple
      - orange
      - red
      - yellow
      - gray
      - pink
      type: string
      description: |-
        * `blue` - Blue
        * `green` - Green
        * `purple` - Purple
        * `orange` - Orange
        * `red` - Red
        * `yellow` - Yellow
        * `gray` - Gray
        * `pink` - Pink
    Connection:
      type: object
      description: |-
        Serializer for Connection model.
        Returns:
        - config: Non-sensitive config from DB
        - auth_config: Actual auth credentials from Secrets Manager (not the internal reference)
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type:
          - integer
          - 'null'
          readOnly: true
        organization:
          type: string
          format: uuid
        connector_type:
          type: string
          maxLength: 50
        connector_display_name:
          type: string
          description: Get the display name for the connector type.
          readOnly: true
        name:
          type: string
          maxLength: 250
        description:
          type: string
        config: {}
        auth_config:
          type: object
          additionalProperties: {}
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - auth_config
      - connector_display_name
      - connector_type
      - created_at
      - id
      - name
      - organization
      - updated_at
      - user
    ConnectionDeleteErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
      - error
