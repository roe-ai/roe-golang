      summary: Retrieve an agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - in: path
        name: agent_version_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent version.
        required: true
      - in: query
        name: get_supports_eval
        schema:
          type: boolean
        description: Include information on whether the agent engine supports evaluation.
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
          description: Successfully retrieved agent version details.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Permission to access this agent denied or access to Agents
            feature is forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent version not found.
    put:
      operationId: v1_agents_versions_update
      description: Update details of a specific agent version (only version name and
        description).
      summary: Update an agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
