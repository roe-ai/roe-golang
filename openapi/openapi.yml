openapi: 3.1.0
info:
  title: Roe API
  version: 1.0.0
  description: Complete API documentation for Roe platform
paths:
  /v1/agents/:
    get:
      operationId: agents_list
      description: Retrieve a list of agents or create a new agent.
      summary: List agents or create a new agent.
      parameters:
      - in: query
        name: engine_class_id
        schema:
          type: string
        description: Filter agents by engine type.
      - in: query
        name: exclude_engine_class_id
        schema:
          type: string
        description: Exclude agents with this engine type.
      - in: query
        name: include_job_stats
        schema:
          type: boolean
        description: 'Include job_count and most_recent_job in response (default:
          true). Set to false for faster response.'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Field to order results by. Prefix with ''-'' for descending.
          Options: name, created_at, most_recent_job, job_count, engine_class_id,
          creator.'
      - in: query
        name: organization_id
        schema:
          type: string
          format: uuid
        description: Organization ID to list agents from.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Search term to filter agents by name, ID, engine, creator, tags,
          or version IDs (case-insensitive).
      - in: query
        name: tags
        schema:
          type: array
          items:
            type: string
        description: Filter agents by tag IDs. Can be provided multiple times.
      tags:
      - agents
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBaseAgentList'
          description: Successfully retrieved list of agents.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                description: 'Validation failure: a map of field name to a list of
                  error messages (DRF serializers) or a single message (e.g. organization_id
                  validation).'
          description: organization_id is missing/invalid or a filter parameter is
            invalid.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden or organization access
            denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Organization not found.
    post:
      operationId: agents_create
      description: Create a new base agent.
      summary: Create a new base agent.
      tags:
      - agents
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseAgentCreateRequest'
        required: true
      security:
      - apiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Successfully created agent.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                description: 'Validation failure: a map of field name to a list of
                  error messages (DRF serializers) or a single message (e.g. organization_id
                  validation).'
          description: Invalid request data.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden.
      parameters:
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
  /v1/agents/{agent_id}/:
    get:
      operationId: agents_retrieve
      description: Retrieve details of a specific base agent.
      summary: Retrieve an agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - agents
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
              examples:
                Example:
                  value:
                    id: 123e4567-e89b-12d3-a456-426614174000
                    name: My Agent
                    creator:
                      id: 2
                      email: user@example.com
                      first_name: John
                      last_name: Doe
                    created_at: '2024-01-15T10:30:00Z'
                    engine_class_id: openai_chat
                    engine_name: OpenAI Chat
                    current_version_id: 456e7890-e89b-12d3-a456-426614174001
                    organization: org-123e4567-e89b-12d3-a456-426614174000
                    disable_cache: false
                    cache_failed_jobs: false
                    job_count: 42
                    most_recent_job: '2024-01-20T15:45:00Z'
          description: Successfully retrieved base agent details.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Agent not found.
    put:
      operationId: agents_update
      description: Update a base agent's settings.
      summary: Update a base agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - agents
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseAgentUpdateRequest'
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Agent updated successfully.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                description: 'Validation failure: a map of field name to a list of
                  error messages (DRF serializers) or a single message (e.g. organization_id
                  validation).'
          description: Invalid update payload (e.g. blank name).
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Agent not found.
    patch:
      operationId: agents_partial_update
      description: Partially update details of a specific base agent.
      summary: Partially update an agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - agents
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBaseAgentUpdateRequest'
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Agent updated successfully.
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                  - type: array
                    items:
                      type: string
                  - type: string
                description: 'Validation failure: a map of field name to a list of
                  error messages (DRF serializers) or a single message (e.g. organization_id
                  validation).'
          description: Invalid update payload (e.g. blank name).
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Agent not found.
    delete:
      operationId: agents_destroy
      description: Delete a specific base agent.
      summary: Delete a base agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - agents
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '204':
          description: Base agent deleted successfully.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Permission to delete this base agent denied or access to Agents
            feature is forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Base agent ID doesn't exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QdrantCleanupErrorResponse'
          description: Base agent deleted but Qdrant collection cleanup failed.
