    TableQueryResultResponse:
      type: object
      description: Response payload for polling or fetching a public Roe table query.
      properties:
        table_query_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TableQueryStatusEnum'
        error:
          type:
          - string
          - 'null'
        columns:
          type: array
          items:
            type: object
            additionalProperties: {}
        rows:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Rows keyed by column name. When truncated is true, an oversized
            cell may be returned as a shortened string even if the original ClickHouse
            value was a nested object or array.
        row_count:
          type: integer
        truncated:
          type: boolean
          description: True when the result hit the row limit, backend result byte
            cap, or an individual huge cell was shortened. In truncated responses,
            any oversized cell may be represented as a string regardless of its original
            ClickHouse type.
