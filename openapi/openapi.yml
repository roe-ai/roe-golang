          be provided via query or request body depending on the endpoint.
      tags:
      - agents
      - sdk
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentVersion'
              examples:
                Example:
                  value:
                  - - id: 456e7890-e89b-12d3-a456-426614174001
                      version_name: version 1
                      description: Initial version
                      input_definitions:
                      - key: input_text
                        description: Text to process
                        data_type: text/plain
                      engine_config:
                        model: gpt-4
                        temperature: '0.7'
                      created_at: '2024-01-15T10:30:00Z'
                      readonly: false
          description: Successfully retrieved list of agent versions.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'
          description: Agent not found.
    post:
      operationId: agents_versions_create
