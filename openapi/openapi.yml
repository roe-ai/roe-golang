components:
  schemas:
    AgentDatum:
      type: object
      properties:
        key:
          type: string
          description: The key of the output
        description:
          type: string
          description: The description of the output
        data_type:
          type: string
          description: The MIME data type of the output
        value:
          type: string
          description: The value of the output, serialized as a string
        cost:
          type: number
          format: double
          description: The cost of the agent job execution
      required:
      - data_type
      - key
      - value
    AgentExecutionRequestRequest:
      type: object
      description: Serializer for agent execution requests with dynamic input fields.
      properties:
        metadata:
          description: Optional metadata as JSON object or JSON string
        agent_input_key_example:
          type: string
          minLength: 1
          description: Agent input keys are dynamic based on agent configuration.
            Can be text or file.
    AgentInputDefinition:
      type: object
      properties:
        key:
          type: string
          description: The unique identifier for this input definition
        data_type:
          type: string
          description: The data type of the input (e.g., text, file, etc.)
        description:
          type: string
          description: Description of what this input is for
        example:
          type: string
          description: An example value for this input
        accepts_multiple_files:
          type: boolean
          description: Whether this input accepts multiple files
      required:
      - data_type
      - description
      - key
    AgentJobDeleteDataResponse:
      type: object
      properties:
        status:
          type: string
          description: 'Overall status: ''success'' or ''partial_success'''
        deleted_count:
          type: integer
          description: Number of input files successfully deleted
        failed_count:
          type: integer
          description: Number of input files that failed to delete
        blob_sanitized:
          type: boolean
          description: Whether blob data (outputs, steps, logs, trace) was successfully
            sanitized
        artifacts_deleted_count:
          type: integer
          description: Number of workflow artifacts successfully deleted
        artifacts_failed_count:
          type: integer
          description: Number of workflow artifacts that failed to delete
        errors:
          type: array
          items: {}
          description: List of errors encountered during deletion
      required:
      - artifacts_deleted_count
      - artifacts_failed_count
      - blob_sanitized
      - deleted_count
      - failed_count
      - status
    AgentJobResultItem:
      type: object
      description: Serializer for individual agent job result item.
      properties:
        id:
          type: string
          description: Agent job ID
        status:
          type:
          - integer
          - 'null'
          description: Job status code (0=PENDING, 1=STARTED, 2=RETRY, 3=SUCCESS,
            4=FAILURE, 5=CANCELLED, 6=CACHED)
        result:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: List of job outputs, or error code if job failed
        corrected_outputs:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: List of corrected outputs if any corrections were made
        agent_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Base agent ID
        agent_version_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Agent version ID
        cost:
          type:
          - number
          - 'null'
          format: double
          description: Cost of the agent job execution
        inputs:
          type:
          - array
          - 'null'
          items: {}
          description: The input data provided to the agent (full version from blob
            if available, truncated from DB otherwise)
        input_tokens:
          type:
          - integer
          - 'null'
          description: Number of input tokens used
        output_tokens:
          type:
          - integer
          - 'null'
          description: Number of output tokens generated
      required:
      - agent_id
      - agent_version_id
      - cost
      - id
      - input_tokens
      - inputs
      - output_tokens
      - result
      - status
    AgentJobResultManyRequestRequest:
      type: object
      description: Serializer for bulk agent job results request.
      properties:
        job_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of agent job IDs to retrieve results for
          minItems: 1
      required:
      - job_ids
    AgentJobResultResponse:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
          description: The ID of the base agent
        agent_version_id:
          type: string
          format: uuid
          description: The ID of the agent version
        inputs:
          type: array
          items: {}
          description: The input data provided to the agent
        input_tokens:
          type:
          - integer
          - 'null'
          description: Number of input tokens used
        output_tokens:
          type:
          - integer
          - 'null'
          description: Number of output tokens generated
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/AgentDatum'
          description: The output data from the agent
      required:
      - agent_id
      - agent_version_id
      - input_tokens
      - inputs
      - output_tokens
      - outputs
    AgentJobStatus:
      type: object
      properties:
        status:
          type: integer
          description: 'Status code. 0: PENDING, 1: STARTED, 2: RETRY, 3: SUCCESS,
            4: FAILURE, 5: CANCELLED, 6: CACHED'
        timestamp:
          type: integer
          description: Unix timestamp in seconds
        error_message:
          type: string
          description: Error message if status is RETRY or FAILURE
      required:
      - status
      - timestamp
    AgentJobStatusManyRequestRequest:
      type: object
      description: Serializer for bulk agent job status request.
      properties:
        job_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of agent job IDs to retrieve statuses for
          minItems: 1
      required:
      - job_ids
    AgentRunAsyncManyRequestRequest:
      type: object
      description: Serializer for agent async many execution requests.
      properties:
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/AgentExecutionRequestRequest'
          description: List of agent execution requests to process
      required:
      - inputs
    AgentVersion:
      type: object
      description: Serializer for Agent (version) model
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        version_name:
          type: string
          description: Version name for the agent version. Defaults to 'unnamed version'
            if not provided.
        creator:
          oneOf:
          - $ref: '#/components/schemas/UserInfo'
          - type: 'null'
        created_at:
          type: string
          format: date-time
          readOnly: true
        description:
          type: string
          description: Description of the agent version.
        engine_class_id:
          type: string
          description: Get engine_class_id from base_agent.
          readOnly: true
        engine_name:
          type: string
          description: Engine Display Name
          readOnly: true
        input_definitions:
          type: array
          items:
            $ref: '#/components/schemas/AgentInputDefinition'
          description: List of input definitions for this agent version.
        engine_config:
          description: Engine configuration.
        organization_id:
          type: string
          format: uuid
          readOnly: true
          description: Organization ID from base_agent.
        readonly:
          type: boolean
          readOnly: true
        base_agent:
          allOf:
          - $ref: '#/components/schemas/BaseAgent'
          readOnly: true
      required:
      - base_agent
      - created_at
      - engine_class_id
      - engine_config
      - engine_name
      - id
      - input_definitions
      - name
      - organization_id
      - readonly
      - version_name
    AgentVersionCreateRequest:
      type: object
      description: Serializer for creating new agent versions
      properties:
        version_name:
          type: string
          minLength: 1
          description: Version name for the agent version. Defaults to 'unnamed version'
            if not provided.
        description:
          type:
          - string
          - 'null'
          description: Description for the agent version.
        input_definitions:
          description: List of input definitions for this agent version.
        engine_config:
          description: Engine configuration as a dictionary of string key-value pairs.
      required:
      - engine_config
      - input_definitions
    AgentVersionUpdateRequestRequest:
      type: object
      properties:
        version_name:
          type: string
          minLength: 1
          description: New version name for the agent version.
        description:
          type: string
          minLength: 1
          description: New description for the agent version.
    BaseAgent:
      type: object
      description: Serializer for BaseAgent (agent config)
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        creator:
          oneOf:
          - $ref: '#/components/schemas/UserInfo'
          - type: 'null'
        created_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 200
          minLength: 1
        disable_cache:
          type: boolean
          description: Whether to disable job cache fetching for this agent.
        cache_failed_jobs:
          type: boolean
          description: Whether to cache failed jobs for this agent.
        organization_id:
          type: string
          format: uuid
          description: Organization ID that owns this agent.
        engine_class_id:
          type: string
          maxLength: 200
        current_version_id:
          type: string
          format: uuid
          readOnly: true
          description: UUID of the current agent version.
        job_count:
          type:
          - integer
          - 'null'
          description: Job count from annotation, or None when not fetched (use /agents/job-stats/).
          readOnly: true
        most_recent_job:
          type: string
          readOnly: true
        engine_name:
          type: string
          description: Engine Display Name
          readOnly: true
        tags:
          type: string
          readOnly: true
      required:
      - cache_failed_jobs
      - created_at
      - current_version_id
      - disable_cache
      - engine_class_id
      - engine_name
      - id
      - job_count
      - most_recent_job
      - name
      - organization_id
      - tags
    BaseAgentCreateRequest:
      type: object
      description: Serializer for creating base agents with proper JSON field handling
      properties:
        name:
          type: string
          minLength: 1
          description: Name of the base agent.
        engine_class_id:
          type: string
          minLength: 1
          description: Engine class ID for the agent.
        organization_id:
          type: string
          format: uuid
          description: Organization ID where the agent belongs.
        version_name:
          type: string
          minLength: 1
          description: Name of the first version.
        description:
          type: string
          minLength: 1
          description: Description of the first version.
        input_definitions:
          description: Input definitions for the first version.
        engine_config:
          description: Engine configuration for the first version.
      required:
      - engine_class_id
      - engine_config
      - input_definitions
      - name
      - organization_id
    BaseAgentUpdateRequest:
      type: object
      description: Serializer for updating BaseAgent
      properties:
        name:
          type: string
          minLength: 1
          description: New name for the agent. Must not be empty if provided.
        disable_cache:
          type: boolean
          description: Whether to disable job cache fetching for this agent.
        cache_failed_jobs:
          type: boolean
          description: Whether to cache failed jobs for this agent.
    CreatePolicy:
      type: object
      description: Serializer for creating a new policy with initial version
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        organization_id:
          type: string
          format: uuid
          readOnly: true
        current_version_id:
          type:
          - string
          - 'null'
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - current_version_id
      - id
      - name
      - organization_id
      - updated_at
    CreatePolicyRequest:
      type: object
      description: Serializer for creating a new policy with initial version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        content:
          writeOnly: true
          description: Content for the initial policy version
        version_name:
          type: string
          writeOnly: true
          minLength: 1
          default: version 1
          description: Name for the initial version (defaults to 'version 1')
          maxLength: 255
      required:
      - content
      - name
    CreatePolicyVersion:
      type: object
      description: Serializer for creating a new policy version
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        version_name:
          type: string
          description: Version name (auto-generated if not provided)
          maxLength: 255
        content: {}
      required:
      - content
      - id
    CreatePolicyVersionRequest:
      type: object
      description: Serializer for creating a new policy version
      properties:
        version_name:
          type: string
          minLength: 1
          description: Version name (auto-generated if not provided)
          maxLength: 255
        content: {}
        base_version_id:
          type: string
          format: uuid
          writeOnly: true
          description: ID of the version this was derived from
      required:
      - content
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
      required:
      - message
    PaginatedAgentJobResultItemList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AgentJobResultItem'
    PaginatedBaseAgentList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/BaseAgent'
    PaginatedPolicyList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
    PaginatedPolicyVersionList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/PolicyVersion'
    PatchedBaseAgentUpdateRequest:
      type: object
      description: Serializer for updating BaseAgent
      properties:
        name:
          type: string
          minLength: 1
          description: New name for the agent. Must not be empty if provided.
        disable_cache:
          type: boolean
          description: Whether to disable job cache fetching for this agent.
        cache_failed_jobs:
          type: boolean
          description: Whether to cache failed jobs for this agent.
    PatchedPatchedAgentVersionUpdateRequestRequest:
      type: object
      properties:
        version_name:
          type: string
          minLength: 1
          description: New version name for the agent version.
        description:
          type: string
          minLength: 1
          description: New description for the agent version.
    PatchedUpdatePolicyRequest:
      type: object
      description: Serializer for updating policy metadata (name, description)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
    Policy:
      type: object
      description: Policy serializer
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        organization_id:
          type: string
          format: uuid
          readOnly: true
        current_version_id:
          type:
          - string
          - 'null'
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - current_version_id
      - id
      - name
      - organization_id
      - updated_at
    PolicyVersion:
      type: object
      description: 'Policy version serializer for public API.


        Exposes auto-generated structure IDs (category/rule/sub-rule IDs) in responses

        so users can reference specific rules. IDs are immutable - any IDs provided
        in

        create/update requests are ignored and regenerated by the backend.'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        version_name:
          type: string
          maxLength: 255
        content: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        policy:
          $ref: '#/components/schemas/Policy'
        created_by:
          allOf:
          - $ref: '#/components/schemas/PolicyVersionCreatedBy'
          readOnly: true
        base_version_id:
          type: string
          format: uuid
          readOnly: true
      required:
      - base_version_id
      - content
      - created_at
      - created_by
      - id
      - policy
      - updated_at
      - version_name
    PolicyVersionCreatedBy:
      type: object
      description: Minimal user serializer for audit metadata on policy versions.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        display_name:
          type: string
          readOnly: true
      required:
      - display_name
      - email
      - id
    UpdatePolicy:
      type: object
      description: Serializer for updating policy metadata (name, description)
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        organization_id:
          type: string
          format: uuid
          readOnly: true
        current_version_id:
          type:
          - string
          - 'null'
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - current_version_id
      - id
      - name
      - organization_id
      - updated_at
    UpdatePolicyRequest:
      type: object
      description: Serializer for updating policy metadata (name, description)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
      required:
      - name
    UserInfo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        display_name:
          type: string
          readOnly: true
      required:
      - display_name
      - email
      - id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: https://api.roe-ai.com
  description: Production API
tags:
- name: sdk
  description: Operations included in the Roe SDK surface.
