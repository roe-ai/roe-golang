        feedback. At least one evaluation data field must be provided per job. Operations
        are atomic - all succeed or all fail.
      summary: Bulk create/update agent jobs evaluation data
      parameters:
      - in: query
        name: organization_id
        schema:
          type: string
          format: uuid
        description: The organization UUID that owns the agent jobs
        required: true
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkAgentJobEvaluationRequest'
            examples:
              MixedEvaluationData:
                value:
                  evaluations:
                  - job_id: 123e4567-e89b-12d3-a456-426614174000
                    reference:
                      expected_output: correct answer
                    human_score: 8.5
                    grader_score: 9.2
                    feedback: Good job overall
                  - job_id: 456e7890-e89b-12d3-a456-426614174001
                    reference:
                      ground_truth: sample data
                    grader_score: 7.8
                  - job_id: 789e0123-e89b-12d3-a456-426614174002
                    human_score: 7.0
                    grader_score: 6.3
                    feedback: Needs improvement
                summary: Mixed evaluation data
              GroundTruthsOnly:
                value:
                  evaluations:
                  - job_id: 123e4567-e89b-12d3-a456-426614174000
                    reference:
                      expected: value1
                  - job_id: 456e7890-e89b-12d3-a456-426614174001
                    reference:
                      expected: value2
                summary: Ground truths only
              ReviewsOnly:
                value:
                  evaluations:
                  - job_id: 123e4567-e89b-12d3-a456-426614174000
                    human_score: 9.0
                    feedback: Excellent work
                  - job_id: 456e7890-e89b-12d3-a456-426614174001
                    human_score: 6.5
                summary: Reviews only
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkAgentJobEvaluationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkAgentJobEvaluationRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  successful_job_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
                  failed_job_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
              examples:
                MixedEvaluationData:
                  value:
                    evaluations:
                    - job_id: 123e4567-e89b-12d3-a456-426614174000
                      reference:
                        expected_output: correct answer
                      human_score: 8.5
                      grader_score: 9.2
                      feedback: Good job overall
                    - job_id: 456e7890-e89b-12d3-a456-426614174001
                      reference:
                        ground_truth: sample data
                      grader_score: 7.8
                    - job_id: 789e0123-e89b-12d3-a456-426614174002
                      human_score: 7.0
                      grader_score: 6.3
                      feedback: Needs improvement
                  summary: Mixed evaluation data
                GroundTruthsOnly:
                  value:
                    evaluations:
                    - job_id: 123e4567-e89b-12d3-a456-426614174000
                      reference:
                        expected: value1
                    - job_id: 456e7890-e89b-12d3-a456-426614174001
                      reference:
                        expected: value2
                  summary: Ground truths only
                ReviewsOnly:
                  value:
                    evaluations:
                    - job_id: 123e4567-e89b-12d3-a456-426614174000
                      human_score: 9.0
                      feedback: Excellent work
                    - job_id: 456e7890-e89b-12d3-a456-426614174001
                      human_score: 6.5
                  summary: Reviews only
                Example:
                  value:
                    successful_job_ids:
                    - 123e4567-e89b-12d3-a456-426614174000
                    - 456e7890-e89b-12d3-a456-426614174001
                    failed_job_ids: []
          description: Successfully processed evaluations
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid request data
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access denied
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Some agent jobs not found
