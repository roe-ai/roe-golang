openapi: 3.1.0
info:
  title: Roe AI API
  version: 1.0.0
  description: Complete API documentation for Roe AI platform
paths:
  /v1/agents/:
    get:
      operationId: v1_agents_list
      description: Retrieve a list of agents or create a new agent.
      summary: List agents or create a new agent.
      parameters:
      - in: query
        name: engine_class_id
        schema:
          type: string
        description: Filter agents by engine type.
      - in: query
        name: exclude_engine_class_id
        schema:
          type: string
        description: Exclude agents with this engine type.
      - in: query
        name: include_job_stats
        schema:
          type: boolean
        description: 'Include job_count and most_recent_job in response (default:
          true). Set to false for faster response.'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Field to order results by. Prefix with ''-'' for descending.
          Options: name, created_at, most_recent_job, job_count, engine_class_id,
          creator.'
      - in: query
        name: organization_id
        schema:
          type: string
          format: uuid
        description: Organization ID to list agents from.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Search term to filter agents by name, ID, engine, creator, tags,
          or version IDs (case-insensitive).
      - in: query
        name: tags
        schema:
          type: array
          items:
            type: string
        description: Filter agents by tag IDs. Can be provided multiple times.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBaseAgentList'
          description: Successfully retrieved list of agents.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: organization_id query parameter is required.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or organization access
            denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Organization not found.
    post:
      operationId: v1_agents_create
      description: Create a new base agent.
      summary: Create a new base agent.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseAgentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BaseAgentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BaseAgentCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Successfully created agent.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid request data.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden.
      parameters:
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
  /v1/agents/{agent_id}/:
    get:
      operationId: v1_agents_retrieve
      description: Retrieve details of a specific base agent.
      summary: Retrieve an agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
              examples:
                Example:
                  value:
                    id: 123e4567-e89b-12d3-a456-426614174000
                    name: My Agent
                    creator:
                      id: 2
                      email: user@example.com
                      first_name: John
                      last_name: Doe
                    created_at: '2024-01-15T10:30:00Z'
                    engine_class_id: openai_chat
                    engine_name: OpenAI Chat
                    current_version_id: 456e7890-e89b-12d3-a456-426614174001
                    organization: org-123e4567-e89b-12d3-a456-426614174000
                    disable_cache: false
                    cache_failed_jobs: false
                    job_count: 42
                    most_recent_job: '2024-01-20T15:45:00Z'
          description: Successfully retrieved base agent details.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
    put:
      operationId: v1_agents_update
      description: Update a base agent's settings.
      summary: Update a base agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseAgentUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BaseAgentUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BaseAgentUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Agent updated successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid name provided.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
    patch:
      operationId: v1_agents_partial_update
      description: Partially update details of a specific base agent.
      summary: Partially update an agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBaseAgentUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBaseAgentUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBaseAgentUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseAgent'
          description: Agent updated successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid name provided.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
    delete:
      operationId: v1_agents_destroy
      description: Delete a specific base agent.
      summary: Delete a base agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '204':
          description: Base agent deleted successfully.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Permission to delete this base agent denied or access to Agents
            feature is forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Base agent ID doesn't exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Failed to delete base agent or some Qdrant collections.
  /v1/agents/{agent_id}/duplicate/:
    post:
      operationId: v1_agents_duplicate_create
      description: Create a new agent with the same attributes as the current version
        of the specified agent.
      summary: Duplicate an agent.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
          description: Agent duplicated successfully.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
  /v1/agents/{agent_id}/export/:
    get:
      operationId: v1_agents_export_retrieve
      description: Export the current agent configuration including all versions as
        JSON for importing into another organization.
      summary: Export an agent configuration.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportExport'
              examples:
                Example:
                  value:
                    name: My Agent
                    engine_class_id: TextExtractionEngine
                    disable_cache: false
                    cache_failed_jobs: false
                    versions:
                    - version_name: version 2
                      description: Updated version
                      input_definitions:
                      - key: text
                        data_type: text/plain
                        description: Text to process
                      engine_config:
                        model: gpt-4
                        instruction: Process the text
                      is_current: true
                    - version_name: version 1
                      description: Initial version
                      input_definitions:
                      - key: text
                        data_type: text/plain
                        description: Text to process
                      engine_config:
                        model: gpt-3.5-turbo
                        instruction: Process the text
                      is_current: false
          description: Successfully exported agent configuration.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
  /v1/agents/{agent_id}/jobs/:
    get:
      operationId: v1_agents_jobs_list
      description: Retrieve a list of jobs for a specific agent or create a new job
      summary: List agent jobs or create a new agent job.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: created_from
        schema:
          type: string
          format: date-time
      - in: query
        name: created_to
        schema:
          type: string
          format: date-time
      - in: query
        name: exclude_metadata
        schema:
          type: string
      - in: query
        name: job_id
        schema:
          type: string
      - in: query
        name: job_inputs
        schema:
          type: string
      - in: query
        name: metadata
        schema:
          type: string
      - in: query
        name: ordering
        schema:
          type: array
          items:
            type: string
            enum:
            - -agent_version_name
            - -cost
            - -created_at
            - -duration
            - -grader_score
            - -id
            - -last_updated_at
            - -status_code
            - agent_version_name
            - cost
            - created_at
            - duration
            - grader_score
            - id
            - last_updated_at
            - status_code
        description: 'Ordering


          * `id` - Job ID

          * `-id` - Job ID (descending)

          * `agent_version_name` - Version

          * `-agent_version_name` - Version (descending)

          * `status_code` - Status

          * `-status_code` - Status (descending)

          * `created_at` - Created At

          * `-created_at` - Created At (descending)

          * `last_updated_at` - Last Updated At

          * `-last_updated_at` - Last Updated At (descending)

          * `cost` - Cost

          * `-cost` - Cost (descending)

          * `duration` - Time Elapsed

          * `-duration` - Time Elapsed (descending)

          * `grader_score` - Score

          * `-grader_score` - Score (descending)'
        explode: false
        style: form
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: semantic_string
        schema:
          type: string
        description: Semantic search string for finding similar jobs using embeddings
      - in: query
        name: status_code
        schema:
          type: string
      - in: query
        name: version_name
        schema:
          type: string
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListAgentJobList'
          description: Successfully retrieved paginated list of agent jobs.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
    post:
      operationId: v1_agents_jobs_create
      description: Create a new job for the specified agent
      summary: Create a new agent job.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentExecutionRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentExecutionRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentExecutionRequestRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentJob'
          description: Successfully created agent job.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Failed to create agent job.
  /v1/agents/{agent_id}/jobs/cancel-all/:
    post:
      operationId: v1_agents_jobs_cancel_all_create
      description: Cancel all running jobs for a given agent.
      summary: Cancel all agent jobs
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      deprecated: true
      responses:
        '204':
          description: All running agent jobs cancelled successfully
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found
  /v1/agents/{agent_id}/versions/:
    get:
      operationId: v1_agents_versions_list
      description: Retrieve a list of versions for a specific agent.
      summary: List agent versions.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentVersion'
              examples:
                Example:
                  value:
                  - - id: 456e7890-e89b-12d3-a456-426614174001
                      version_name: version 1
                      description: Initial version
                      input_definitions:
                      - key: input_text
                        description: Text to process
                        data_type: text/plain
                      engine_config:
                        model: gpt-4
                        temperature: '0.7'
                      created_at: '2024-01-15T10:30:00Z'
                      readonly: false
          description: Successfully retrieved list of agent versions.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
    post:
      operationId: v1_agents_versions_create
      description: Create a new version of an existing agent.
      summary: Create a new agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentVersionCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentVersionCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentVersionCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
              examples:
                Example:
                  value:
                    id: 789e1234-e89b-12d3-a456-426614174002
                    version_name: version 2
                    description: Updated version with new features
                    input_definitions:
                    - key: input_text
                      description: Text to process
                      data_type: text/plain
                    engine_config:
                      model: gpt-4
                      temperature: '0.5'
                    created_at: '2024-01-16T14:20:00Z'
                    readonly: false
                    engine_class_id: openai_chat
                    organization: org-123e4567-e89b-12d3-a456-426614174000
          description: Successfully created new agent version.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid request data.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access to the Agents feature is forbidden or permission to
            access this agent denied.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent not found.
  /v1/agents/{agent_id}/versions/{agent_version_id}/:
    get:
      operationId: v1_agents_versions_retrieve
      description: Retrieve details of a specific agent version.
      summary: Retrieve an agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - in: path
        name: agent_version_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent version.
        required: true
      - in: query
        name: get_supports_eval
        schema:
          type: boolean
        description: Include information on whether the agent engine supports evaluation.
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
          description: Successfully retrieved agent version details.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Permission to access this agent denied or access to Agents
            feature is forbidden.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Agent version not found.
    put:
      operationId: v1_agents_versions_update
      description: Update details of a specific agent version (only version name and
        description).
      summary: Update an agent version.
      parameters:
      - in: path
        name: agent_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying the base agent.
        required: true
      - in: path
        name: agent_version_id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent version.
        required: true
      - name: organization_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Organization ID. This is required for access control. It can
          be provided via query or request body depending on the endpoint.
      tags:
      - v1
      - sdk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentVersionUpdateRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentVersionUpdateRequestRequest'
          multipart/form-data:
