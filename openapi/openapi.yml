components:
  schemas:
    AgentDatum:
      type: object
      properties:
        key:
          type: string
          description: The key of the output
        description:
          type: string
          description: The description of the output
        data_type:
          type: string
          description: The MIME data type of the output
        value:
          type: string
          description: The value of the output, serialized as a string
        cost:
          type: number
          format: double
          description: The cost of the agent job execution
      required:
      - data_type
      - key
      - value
    AgentExecutionRequestRequest:
      type: object
      description: Serializer for agent execution requests with dynamic input fields.
      properties:
        metadata:
          description: Optional metadata as JSON object or JSON string
        agent_input_key_example:
          type: string
          minLength: 1
          description: Agent input keys are dynamic based on agent configuration.
            Can be text or file.
    AgentImportExport:
      type: object
      description: Serializer for agent data shared by import and export
      properties:
        name:
          type: string
          description: Agent name
